<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHORE - Process ROI Calculator</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
--bk:#0D0D0D;--dk:#141414;--cd:#1A1A1A;--br:#2A2A2A;--br2:#333;
--gd:#F5C842;--gd2:#C9A230;--tx:#F0EDE6;--mt:#8A8580;
--gn:#1D9E75;--rd:#E24B4A;--bl:#378ADD;
}
body{background:var(--bk);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--tx);min-height:100vh;}
.app{max-width:1000px;margin:0 auto;background:var(--bk);min-height:100vh;box-shadow:0 0 30px rgba(0,0,0,0.5);}
.topbar{background:var(--dk);border-bottom:1px solid var(--br);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;}
.brand{display:flex;align-items:center;gap:10px;}
.brace{font-size:26px;font-weight:700;color:var(--gd);line-height:1;}
.bname{font-size:14px;font-weight:500;color:var(--tx);letter-spacing:.08em;}
.bsub{font-size:9px;color:var(--mt);letter-spacing:.14em;text-transform:uppercase;margin-top:1px;}
.top-actions{display:flex;gap:8px;}
.btn-imp{background:none;border:1px solid var(--br2);border-radius:6px;padding:7px 12px;font-size:11px;color:var(--mt);cursor:pointer;display:flex;align-items:center;gap:5px;}
.btn-imp:hover{color:var(--tx);border-color:var(--mt);}
.btn-exp{background:var(--gd);color:var(--bk);border:none;border-radius:6px;padding:7px 12px;font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;}
.btn-exp:hover{background:var(--gd2);}

.phase-bar{background:var(--dk);border-bottom:1px solid var(--br);display:flex;}
.phase{flex:1;padding:14px 16px;text-align:center;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;}
.phase.active{border-bottom-color:var(--gd);}
.phase-num{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--mt);margin-bottom:3px;}
.phase-label{font-size:12px;font-weight:500;color:var(--mt);}
.phase.active .phase-label{color:var(--gd);}
.phase.done .phase-label{color:var(--gn);}
.phase.done .phase-num{color:var(--gn);}

.body{padding:16px;}
.sec{background:var(--cd);border:1px solid var(--br);border-radius:8px;padding:16px;margin-bottom:12px;}
.sec-title{font-size:9px;font-weight:600;color:var(--gd);letter-spacing:.14em;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:6px;}
.sec-title i{font-size:13px;}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.ff{display:flex;flex-direction:column;gap:4px;}
.ff label{font-size:11px;color:var(--mt);font-weight:500;}
.ff input, .ff select, .ff textarea{background:#0F0F0F;border:1px solid var(--br);border-radius:6px;color:var(--tx);font-size:13px;padding:8px 10px;outline:none;font-family:inherit;width:100%;}
.ff input:focus, .ff select:focus, .ff textarea:focus{border-color:var(--gd);}
.ff textarea{resize:vertical;min-height:60px;}
.ff .hint{font-size:10px;color:var(--mt);margin-top:2px;}
.ff select option{background:#111;}
.full{grid-column:1/-1;}

.check-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:4px 0;}
.check-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--tx);cursor:pointer;}
.check-item input{width:auto;cursor:pointer;}

.people-row{display:flex;gap:8px;align-items:flex-end;margin-bottom:8px;}
.people-row .ff{flex:1;}
.people-row .ff.fixed-w{flex:0 0 65px;}
.people-row .ff.fixed-w2{flex:0 0 100px;}
.rm-btn{background:none;border:1px solid var(--br);border-radius:6px;padding:8px;cursor:pointer;color:var(--mt);font-size:13px;height:36px;display:flex;align-items:center;}
.rm-btn:hover{color:var(--rd);border-color:var(--rd);}
.add-btn{background:none;border:1px dashed var(--br2);border-radius:6px;padding:8px 14px;font-size:12px;color:var(--mt);cursor:pointer;width:100%;margin-top:4px;}
.add-btn:hover{border-color:var(--gd);color:var(--gd);}

.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--br);}
.toggle-row:last-child{border:none;}
.toggle-label{font-size:12px;color:var(--tx);}
.toggle-hint{font-size:10px;color:var(--mt);margin-top:2px;}
.tog{display:flex;gap:6px;}
.tog button{padding:5px 12px;border-radius:999px;font-size:11px;border:1px solid var(--br);background:none;color:var(--mt);cursor:pointer;}
.tog button.active-y{background:#0A1F15;border-color:var(--gn);color:var(--gn);}
.tog button.active-n{background:#1A0A0A;border-color:var(--rd);color:var(--rd);}
.tog button.active-b{background:#0A1A2A;border-color:var(--bl);color:var(--bl);}

.alert{background:#1A1200;border:1px solid #F5C84255;border-radius:6px;padding:10px 14px;font-size:12px;color:var(--gd);margin-bottom:12px;display:none;}
.alert ul{margin-top:4px;padding-left:14px;}

.roi-preview{background:#0A1F15;border:1px solid #1D9E7555;border-radius:8px;padding:14px;margin-top:12px;}
.roi-preview-title{font-size:9px;color:var(--gn);letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px;}
.roi-row{display:flex;justify-content:space-between;padding:4px 0;font-size:12px;}
.roi-row span:first-child{color:var(--mt);}
.roi-row span:last-child{color:var(--tx);font-weight:500;}
.roi-row total span:last-child{color:var(--gd);font-size:15px;}
.roi-row.total{border-top:1px solid #1D9E7533;margin-top:6px;padding-top:8px;}

.rtable{width:100%;border-collapse:collapse;font-size:12px;}
.rtable th{text-align:left;padding:7px 8px;border-bottom:1px solid var(--br);color:var(--mt);font-weight:500;font-size:9px;letter-spacing:.1em;text-transform:uppercase;}
.rtable td{padding:10px 8px;border-bottom:1px solid #1C1C1C;vertical-align:middle;color:var(--tx);}
.sbar{height:4px;background:#222;border-radius:999px;margin-top:4px;overflow:hidden;}
.sfill{height:100%;border-radius:999px;}

.empty{text-align:center;padding:2.5rem 1rem;color:var(--mt);font-size:13px;}
.empty i{font-size:26px;display:block;margin-bottom:8px;color:var(--br2);}

.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:12px;}
.mc{background:#111;border-radius:6px;padding:12px;border:1px solid var(--br);}
.mc-label{font-size:9px;color:var(--mt);margin-bottom:4px;text-transform:uppercase;letter-spacing:.1em;}
.mc-val{font-size:18px;font-weight:500;color:var(--tx);}
.mc-val.pos{color:var(--gn);}
.mc-val.gld{color:var(--gd);}

.pitch-box{background:#111;border:1px solid var(--br);border-radius:8px;padding:16px;margin-top:14px;display:none;}
.pitch-text{background:#070707;border:1px solid var(--br2);border-radius:6px;padding:12px;color:#A9A9A9;font-size:12px;white-space:pre-wrap;max-height:250px;overflow-y:auto;font-family:monospace;margin-bottom:10px;}

.btn-row{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;}
.btn-primary{background:var(--gd);color:var(--bk);border:none;border-radius:6px;padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;}
.btn-primary:hover{background:var(--gd2);}
.btn-sec{background:none;border:1px solid var(--br);border-radius:6px;padding:10px 18px;font-size:13px;cursor:pointer;color:var(--mt);}
.btn-sec:hover{color:var(--tx);}

input[type=file]{display:none;}
</style>
</head>
<body>

<div class="app">

<div class="topbar">
  <div class="brand">
    <div class="brace">{</div>
    <div>
      <div class="bname">SHORE</div>
      <div class="bsub">Process ROI Calculator</div>
    </div>
  </div>
  <div class="top-actions">
    <button class="btn-imp" onclick="document.getElementById('file-in').click()"><i class="ti ti-upload"></i> Importar</button>
    <input type="file" id="file-in" accept=".json" onchange="importData(event)"/>
    <button class="btn-exp" onclick="exportData()"><i class="ti ti-download"></i> Exportar</button>
  </div>
</div>

<div class="phase-bar">
  <div class="phase active" id="ph-r1" onclick="switchPhase('r1')">
    <div class="phase-num">Etapa 1</div>
    <div class="phase-label">Diagnóstico do Processo</div>
  </div>
  <div class="phase" id="ph-r2" onclick="switchPhase('r2')">
    <div class="phase-num">Etapa 2</div>
    <div class="phase-label">Montar Proposta</div>
  </div>
  <div class="phase" id="ph-rank" onclick="switchPhase('rank')">
    <div class="phase-num">Etapa 3</div>
    <div class="phase-label">Resultados & Pitch (<span id="cnt">0</span>)</div>
  </div>
</div>

<div class="body">

  <div id="view-r1">
    <div class="alert" id="alert-r1"><strong>Campos obrigatórios:</strong><ul id="alert-list-r1"></ul></div>

    <div class="sec">
      <div class="sec-title"><i class="ti ti-building"></i> Contexto Geral</div>
      <div class="fg">
        <div class="ff"><label>Empresa</label><input id="c-empresa" type="text" placeholder="Ex: Grupo Votorantim"/></div>
        <div class="ff"><label>Nome do contato principal</label><input id="c-contato" type="text" placeholder="Ex: Marcos Andrade"/></div>
      </div>
    </div>

    <div class="sec">
      <div class="sec-title"><i class="ti ti-clock-play"></i> Frequência e Tempo de Execução</div>
      <div class="fg">
        <div class="ff full"><label>Nome do processo *</label><input id="p-name" type="text" placeholder="Ex: Conciliação bancária mensal"/></div>
        <div class="ff"><label>Recorrência do processo</label>
          <select id="p-funit" onchange="updatePreview()">
            <option value="dia">Diário</option>
            <option value="semana">Semanal</option>
            <option value="mes" selected>Mensal</option>
            <option value="ano">Anual</option>
          </select>
        </div>
        <div class="ff"><label>Quantas vezes é executado por período? *</label><input id="p-freq" type="number" min="1" value="1" oninput="updatePreview()"/></div>
        <div class="ff"><label>Tempo gasto em CADA execução (Minutos) *</label><input id="p-time" type="number" min="1" placeholder="Ex: 45" oninput="updatePreview()"/></div>
        <div class="ff"><label>Volume de itens/registros por execução (Opcional)</label><input id="p-vol" type
